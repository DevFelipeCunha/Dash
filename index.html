<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTEL Analytics - Cloud Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
        .dark .glass-card {
            background: rgba(30, 41, 59, 0.8);
            border-color: rgba(71, 85, 105, 0.5);
            color: #f1f5f9;
        }
        .sidebar { background: #1e293b; }
        .nav-link.active {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            border-left: 4px solid #3b82f6;
        }
        #loader {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 4px;
            background: #3b82f6;
            z-index: 100;
            animation: loading 2s infinite;
        }
        @keyframes loading {
            0% { width: 0; }
            50% { width: 70%; }
            100% { width: 100%; }
        }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100">

    <div id="loader"></div>

    <!-- Sidebar -->
    <aside class="sidebar w-64 hidden md:flex flex-col text-slate-300">
        <div class="p-6 border-b border-slate-700/50">
            <div class="flex items-center gap-3 text-white">
                <i class="fas fa-chart-line text-blue-500 text-2xl"></i>
                <span class="font-bold text-xl tracking-tight">CTEL Admin</span>
            </div>
        </div>
        
        <nav class="flex-1 p-4 space-y-2">
            <button onclick="switchTab('dashboard')" id="btn-dashboard" class="nav-link active w-full flex items-center gap-3 p-3 rounded-lg transition">
                <i class="fas fa-th-large"></i> Dashboard
            </button>
            <button onclick="switchTab('reportes')" id="btn-reportes" class="nav-link w-full flex items-center gap-3 p-3 rounded-lg transition hover:bg-slate-800">
                <i class="fas fa-list-ul"></i> Histórico
            </button>
        </nav>

        <div class="p-6 border-t border-slate-700/50 text-xs space-y-4">
            <button onclick="loadData()" class="w-full flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white p-2 rounded transition">
                <i class="fas fa-sync"></i> Atualizar Nuvem
            </button>
            <p class="text-slate-500 text-center">© 2026 CTEL Analytics</p>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col overflow-hidden">
        
        <!-- Header -->
        <header class="h-16 glass-card flex items-center justify-between px-8 z-10">
            <h1 id="pageTitle" class="font-bold text-lg">Painel de Monitoramento</h1>
            <div class="flex items-center gap-4">
                <span id="currentTime" class="text-sm font-mono text-slate-500 hidden sm:block"></span>
                <button onclick="toggleDarkMode()" class="p-2 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition">
                    <i id="themeIcon" class="fas fa-moon"></i>
                </button>
                <button onclick="openCreateModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-lg transition">
                    <i class="fas fa-plus mr-2"></i> Novo Registro
                </button>
            </div>
        </header>

        <!-- Dashboard Tab -->
        <div id="tab-dashboard" class="tab-content flex-1 overflow-y-auto p-8 custom-scroll">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                <div class="glass-card p-6 rounded-2xl border-b-4 border-blue-500 shadow-sm">
                    <p class="text-slate-500 text-sm font-semibold uppercase">Total Chamados</p>
                    <h3 class="text-4xl font-black mt-1" id="kpiTotal">0</h3>
                </div>
                <div class="glass-card p-6 rounded-2xl border-b-4 border-red-500 shadow-sm">
                    <p class="text-slate-500 text-sm font-semibold uppercase">Pendentes</p>
                    <h3 class="text-4xl font-black mt-1" id="kpiPendente">0</h3>
                </div>
                <div class="glass-card p-6 rounded-2xl border-b-4 border-emerald-500 shadow-sm">
                    <p class="text-slate-500 text-sm font-semibold uppercase">Resolvidos</p>
                    <h3 class="text-4xl font-black mt-1" id="kpiResolved">0</h3>
                </div>
                <div class="glass-card p-6 rounded-2xl border-b-4 border-amber-500 shadow-sm">
                    <p class="text-slate-500 text-sm font-semibold uppercase">Taxa Conclusão</p>
                    <h3 class="text-4xl font-black mt-1" id="kpiTaxa">0%</h3>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="glass-card p-6 rounded-2xl h-80">
                    <canvas id="statusChart"></canvas>
                </div>
                <div class="glass-card p-6 rounded-2xl h-80">
                    <canvas id="cabineChart"></canvas>
                </div>
            </div>
        </div>

        <!-- History Tab -->
        <div id="tab-reportes" class="tab-content hidden flex-1 overflow-y-auto p-8 custom-scroll">
            <div class="glass-card rounded-2xl overflow-hidden shadow-sm">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 dark:bg-slate-900 border-b dark:border-slate-800 text-xs font-bold uppercase text-slate-500">
                        <tr>
                            <th class="px-6 py-4">ID</th>
                            <th class="px-6 py-4">Data/Hora</th>
                            <th class="px-6 py-4">Cabine</th>
                            <th class="px-6 py-4">Sintoma</th>
                            <th class="px-6 py-4">Status</th>
                            <th class="px-6 py-4 text-right">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y dark:divide-slate-800 text-sm">
                        <!-- Gerado via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal -->
    <div id="modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white dark:bg-slate-900 rounded-3xl w-full max-w-2xl p-8 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold" id="modalTitle">Novo Registro</h2>
                <button onclick="toggleModal()" class="text-slate-400 hover:text-red-500"><i class="fas fa-times text-xl"></i></button>
            </div>
            <form id="incidentForm" class="grid grid-cols-2 gap-4">
                <input type="hidden" id="editId">
                <div class="col-span-2 sm:col-span-1">
                    <label class="block text-xs font-bold mb-2">Data/Hora</label>
                    <input type="datetime-local" id="formHora" required class="w-full p-3 rounded-xl border dark:bg-slate-800 dark:border-slate-700">
                </div>
                <div class="col-span-2 sm:col-span-1">
                    <label class="block text-xs font-bold mb-2">Cabine</label>
                    <select id="formCabine" required class="w-full p-3 rounded-xl border dark:bg-slate-800 dark:border-slate-700">
                        <option>Centro</option><option>Sul</option><option>Leste</option><option>Norte/Oeste</option>
                    </select>
                </div>
                <div class="col-span-2">
                    <label class="block text-xs font-bold mb-2">Sintoma / Problema</label>
                    <input type="text" id="formSintoma" required placeholder="Ex: Queda de sinal" class="w-full p-3 rounded-xl border dark:bg-slate-800 dark:border-slate-700">
                </div>
                <div class="col-span-1">
                    <label class="block text-xs font-bold mb-2">Técnico</label>
                    <input type="text" id="formTecnico" required class="w-full p-3 rounded-xl border dark:bg-slate-800 dark:border-slate-700">
                </div>
                <div class="col-span-1">
                    <label class="block text-xs font-bold mb-2">Status Inicial</label>
                    <select id="formStatus" class="w-full p-3 rounded-xl border dark:bg-slate-800 dark:border-slate-700">
                        <option>Pendente</option><option>Progresso</option><option>Resolvido</option>
                    </select>
                </div>
                <div class="col-span-2 flex gap-3 mt-6">
                    <button type="button" onclick="saveIncident()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-bold transition shadow-lg shadow-blue-500/30">
                        <i class="fas fa-cloud-upload-alt mr-2"></i> SALVAR NA NUVEM
                    </button>
                    <button type="button" onclick="toggleModal()" class="px-6 py-3 border dark:border-slate-700 rounded-xl font-bold">CANCELAR</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // CONFIGURAÇÃO: URL da sua Web App do Google
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbybR_iG3bUOzy_4UZr2TO5pqP-uil4osX0Dap-GJAkkXli2t7fH8O84yhYto61zgpn1xw/exec";

        let incidentes = [];
        let charts = {};

        window.onload = () => {
            if (localStorage.getItem('darkMode') === 'enabled') toggleDarkMode(true);
            loadData();
            startTime();
        };

        async function loadData() {
            showLoader(true);
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                incidentes = Array.isArray(data) ? data : [];
                refreshUI();
            } catch (e) {
                console.error("Erro ao carregar dados da nuvem:", e);
                alert("Falha na conexão com o banco de dados.");
            }
            showLoader(false);
        }

        async function saveIncident() {
            const editId = document.getElementById('editId').value;
            const payload = {
                action: editId ? 'edit' : 'create',
                id: editId,
                hora: document.getElementById('formHora').value,
                cabine: document.getElementById('formCabine').value,
                status: document.getElementById('formStatus').value,
                sintoma: document.getElementById('formSintoma').value,
                tecnico: document.getElementById('formTecnico').value,
                descricao: "", // Opcional
                solucao: ""    // Opcional
            };

            showLoader(true);
            try {
                // Usando mode: 'no-cors' se o Google Apps Script não tiver headers de CORS configurados
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                
                toggleModal();
                setTimeout(loadData, 500); // Pequeno delay para a planilha processar
            } catch (e) {
                console.error("Erro ao salvar:", e);
            }
            showLoader(false);
        }

        async function confirmDelete(id) {
            if(!confirm("Deseja realmente remover este registro da nuvem?")) return;
            showLoader(true);
            await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'delete', id: id })
            });
            loadData();
        }

        function refreshUI() {
            renderTable();
            updateKPIs();
            renderCharts();
        }

        function updateKPIs() {
            const total = incidentes.length;
            const resolvidos = incidentes.filter(i => i.status === 'Resolvido').length;
            const pendentes = incidentes.filter(i => i.status === 'Pendente').length;
            const taxa = total > 0 ? Math.round((resolvidos / total) * 100) : 0;

            document.getElementById('kpiTotal').innerText = total;
            document.getElementById('kpiResolved').innerText = resolvidos;
            document.getElementById('kpiPendente').innerText = pendentes;
            document.getElementById('kpiTaxa').innerText = `${taxa}%`;
        }

        function renderTable() {
            const body = document.getElementById('tableBody');
            body.innerHTML = '';
            incidentes.forEach(inc => {
                const statusColor = inc.status === 'Resolvido' ? 'bg-emerald-100 text-emerald-700' : 
                                    inc.status === 'Pendente' ? 'bg-red-100 text-red-700' : 'bg-blue-100 text-blue-700';
                
                body.insertAdjacentHTML('beforeend', `
                    <tr class="hover:bg-slate-50 dark:hover:bg-slate-900/40 transition">
                        <td class="px-6 py-4 font-mono text-blue-500 font-bold">#${inc.id}</td>
                        <td class="px-6 py-4">${new Date(inc.hora).toLocaleString('pt-BR')}</td>
                        <td class="px-6 py-4 font-semibold">${inc.cabine}</td>
                        <td class="px-6 py-4 max-w-xs truncate">${inc.sintoma}</td>
                        <td class="px-6 py-4">
                            <span class="px-3 py-1 rounded-full text-xs font-bold ${statusColor}">${inc.status}</span>
                        </td>
                        <td class="px-6 py-4 text-right">
                            <button onclick="openEditModal(${inc.id})" class="p-2 text-blue-400 hover:text-blue-600"><i class="fas fa-edit"></i></button>
                            <button onclick="confirmDelete(${inc.id})" class="p-2 text-red-400 hover:text-red-600"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `);
            });
        }

        function renderCharts() {
            // Limpa gráficos anteriores para não bugar ao atualizar
            if(charts.status) charts.status.destroy();
            if(charts.cabine) charts.cabine.destroy();

            const ctx1 = document.getElementById('statusChart').getContext('2d');
            const ctx2 = document.getElementById('cabineChart').getContext('2d');

            const statusData = {
                Pendente: incidentes.filter(i => i.status === 'Pendente').length,
                Progresso: incidentes.filter(i => i.status === 'Progresso').length,
                Resolvido: incidentes.filter(i => i.status === 'Resolvido').length
            };

            const cabines = [...new Set(incidentes.map(i => i.cabine))];
            const cabineData = cabines.map(c => incidentes.filter(i => i.cabine === c).length);

            charts.status = new Chart(ctx1, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(statusData),
                    datasets: [{
                        data: Object.values(statusData),
                        backgroundColor: ['#ef4444', '#3b82f6', '#10b981'],
                        borderWidth: 0
                    }]
                },
                options: { maintainAspectRatio: false, plugins: { title: { display: true, text: 'Distribuição de Status' } } }
            });

            charts.cabine = new Chart(ctx2, {
                type: 'bar',
                data: {
                    labels: cabines,
                    datasets: [{
                        label: 'Incidentes',
                        data: cabineData,
                        backgroundColor: '#6366f1',
                        borderRadius: 8
                    }]
                },
                options: { maintainAspectRatio: false, plugins: { title: { display: true, text: 'Volume por Cabine' } } }
            });
        }

        // Helpers de Interface
        function showLoader(show) { document.getElementById('loader').style.display = show ? 'block' : 'none'; }
        function toggleModal() { document.getElementById('modal').classList.toggle('hidden'); }
        
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.remove('hidden');
            document.getElementById(`btn-${tabId}`).classList.add('active');
            document.getElementById('pageTitle').innerText = tabId === 'dashboard' ? 'Painel de Monitoramento' : 'Histórico de Registros';
        }

        function openCreateModal() {
            document.getElementById('incidentForm').reset();
            document.getElementById('editId').value = "";
            document.getElementById('modalTitle').innerText = "Novo Registro";
            document.getElementById('formHora').value = new Date().toISOString().slice(0,16);
            toggleModal();
        }

        function openEditModal(id) {
            const inc = incidentes.find(i => i.id == id);
            document.getElementById('editId').value = inc.id;
            document.getElementById('formHora').value = inc.hora;
            document.getElementById('formCabine').value = inc.cabine;
            document.getElementById('formStatus').value = inc.status;
            document.getElementById('formSintoma').value = inc.sintoma;
            document.getElementById('formTecnico').value = inc.tecnico;
            document.getElementById('modalTitle').innerText = "Editar Registro #" + id;
            toggleModal();
        }

        function toggleDarkMode(force) {
            const isDark = force || document.documentElement.classList.toggle('dark');
            localStorage.setItem('darkMode', isDark ? 'enabled' : 'disabled');
            document.getElementById('themeIcon').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        }

        function startTime() {
            document.getElementById('currentTime').innerText = new Date().toLocaleString('pt-BR');
            setTimeout(startTime, 1000);
        }
    </script>
</body>
</html>
